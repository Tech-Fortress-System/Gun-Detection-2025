<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - Tech Fortress Security</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">📹 Tech Fortress Security Admin</span>
    </div>
  </nav>

  <div class="container">
    <h3>📍 Camera Location: <strong>{{ camera_location }}</strong></h3>
    <p>🕒 Last Alert Time: <strong>{{ last_alert }}</strong></p>

    {% if image_exists %}
    <div class="mt-4">
      <h5>📸 Latest Detection Snapshot</h5>
      <img
        src="{{ url_for('static', filename='cellphone_detection.jpg') }}"
        class="img-fluid border rounded"
        alt="Detection Snapshot"
      />
    </div>
    {% else %}
    <div class="alert alert-success mt-4">✅ No alerts have been triggered yet.</div>
    {% endif %}
  </div>
</body>
</html>
